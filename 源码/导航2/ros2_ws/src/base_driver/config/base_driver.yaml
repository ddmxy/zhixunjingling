/base_driver_node:
  ros__parameters:
    port: /dev/ttyUSB0   # nav chassis; lidar=ACM0, arm=ACM1, arm_cam=USB1
    baudrate: 115200
    publish_rate_hz: 50.0
    odom_frame_id: odom
    base_frame_id: base_footprint
    imu_frame_id: imu_link
    yaw_offset_rad: 0.0
    use_first_yaw_as_zero: true
    assume_nonholonomic: true
    vx_deadband_mps: 0.005
    vy_deadband_mps: 0.01
    wz_deadband_rps: 0.01
    feedback_timeout_s: 0.20
    # RDK-side odom calibration from ground-truth test (physical 360deg):
    #   MCU yaw ~478deg -> scale 360/478; wz integral ~716deg -> scale 360/716
    imu_yaw_delta_scale: 0.753138
    imu_wz_scale: 0.502793
    vx_scale: 1.0
    cmd_watchdog_timeout_s: 0.5
    send_zero_cmd_on_startup: true
    zero_cmd_hz: 2.0
    enable_rx_log: true
    pose_covariance_diag: [0.05, 0.05, 1000000.0, 1000000.0, 1000000.0, 0.2]
    twist_covariance_diag: [0.05, 0.05, 1000000.0, 1000000.0, 1000000.0, 0.2]
